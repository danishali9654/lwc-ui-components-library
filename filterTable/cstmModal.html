<template>
    
    <div class={customModal}>
    <div role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open " if:true={isOpen}>
        <div class="slds-modal__container">
            <!-- Header -->
            <header class="slds-modal__header">
                <template if:true={showCloseButton}>
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                    </button> 
                </template>
                <h2 class="slds-text-heading_medium title">{modalTitle}</h2>
            </header>
            <!-- Body with slot for dynamic content -->
            <div class="slds-modal__content">
                <slot name="modal-body"></slot>
            </div>
            <!-- Footer with slot for dynamic content -->
            <footer class="slds-modal__footer">
                <slot name="modal-footer"></slot>
            </footer>
        </div>
    </div>
        <div class="slds-backdrop slds-backdrop_open" if:true={isOpen}></div>
</div>

</template>
